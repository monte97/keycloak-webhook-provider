name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check formatting (Spotless)
        run: make fmt-check

      - name: Static analysis (SpotBugs)
        run: make spotbugs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Unit tests (Java + UI)
        run: make test-unit

      - name: OpenAPI lint
        run: make openapi-lint

      - name: OpenAPI spec/code drift check
        run: make openapi-diff

  mutation:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Mutation testing (Pitest)
        run: make test-mutation

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - name: Build JAR
        run: make package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v5
        with:
          name: keycloak-webhook-provider
          path: target/keycloak-webhook-provider-*.jar
