name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check formatting (Spotless)
        run: make fmt-check

      - name: Static analysis (SpotBugs)
        run: make spotbugs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Unit tests (Java + UI)
        run: make test-unit

      - name: OpenAPI lint
        run: make openapi-lint

      - name: OpenAPI spec/code drift check
        run: make openapi-diff

  mutation:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Mutation testing (Pitest)
        run: make test-mutation

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - name: Build JAR
        run: make package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v5
        with:
          name: keycloak-webhook-provider
          path: target/keycloak-webhook-provider-*.jar

  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: maven

  publish:
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    needs: release-please
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set version in pom.xml
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "0,/<version>.*<\/version>/s/<version>.*<\/version>/<version>${VERSION}<\/version>/" pom.xml

      - name: Build JAR
        run: make package

      - name: Upload JAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: target/keycloak-webhook-provider-*.jar
