name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webhook-ui/package-lock.json

      - name: Check formatting (Spotless)
        run: make fmt-check BUILD=local

      - name: Static analysis (SpotBugs)
        run: make spotbugs BUILD=local

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webhook-ui/package-lock.json

      - name: Unit tests (Java + UI)
        run: make test-unit BUILD=local

      - name: OpenAPI lint
        run: make openapi-lint BUILD=local

      - name: OpenAPI spec/code drift check
        run: make openapi-diff BUILD=local

  mutation:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Mutation testing (Pitest)
        run: make test-mutation BUILD=local

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webhook-ui/package-lock.json

      - name: Build JAR + SBOM (Java)
        run: make package BUILD=local

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v5
        with:
          name: keycloak-webhook-provider
          path: target/keycloak-webhook-provider-*.jar

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webhook-ui/package-lock.json

      - name: Download JAR artifact
        uses: actions/download-artifact@v5
        with:
          name: keycloak-webhook-provider
          path: target/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright + deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    needs: [lint, test]
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: maven

  publish:
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [release-please, build]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webhook-ui/package-lock.json

      - name: Set version in pom.xml
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "0,/<version>.*<\/version>/s/<version>.*<\/version>/<version>${VERSION}<\/version>/" pom.xml

      - name: Build JAR + SBOM (Java)
        run: make package BUILD=local

      - name: Generate SBOM (frontend)
        run: |
          cd webhook-ui
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file bom-ui.json \
            --package-lock-only

      - name: Upload JAR and SBOMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            target/keycloak-webhook-provider-*.jar
            target/bom.json
            webhook-ui/bom-ui.json
