name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unit tests (Java + UI)
        run: make test-unit

      - name: OpenAPI lint
        run: make openapi-lint

      - name: OpenAPI spec/code drift check
        run: make openapi-diff

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build JAR
        run: make package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-webhook-provider
          path: target/keycloak-webhook-provider-*.jar
