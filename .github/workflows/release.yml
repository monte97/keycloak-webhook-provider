name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build JAR
        run: make package

      - name: Rename JAR to release version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp target/keycloak-webhook-provider-*.jar \
             target/keycloak-webhook-provider-${VERSION}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/keycloak-webhook-provider-${{ github.ref_name }}.jar
